spring.application.name=assistant

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/college_assistant}

# JWT properties
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# Server port
server.port=${PORT:8082}

spring.data.mongodb.auto-index-creation=true

# Gemini API Key
app.gemini.api-key=${APP_GEMINI_API_KEY}
app.gemini.model=gemini-flash-latest
