services:
  # Backend Web Service (Spring Boot)
  - type: web
    name: timetable-backend
    env: docker
    rootDir: backend
    envVars:
      - key: MONGODB_URI
        sync: false # You will provide your MongoDB Atlas URI here
      - key: APP_JWT_SECRET
        sync: false # Provide a secure 64-character secret
      - key: APP_GEMINI_API_KEY
        sync: false # Provide your Gemini API key
      - key: APP_FRONTEND_URL
        sync: false # Set to your frontend's Render URL (e.g., https://timetable-frontend.onrender.com)

  # Frontend Static Site (React/Vite)
  - type: web
    name: timetable-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # You will set this to your backend's Render URL (e.g., https://timetable-backend.onrender.com/api)
